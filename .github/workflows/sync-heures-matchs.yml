name: Sync CNF3 (heures de matchs)

on:
  schedule:
     # Toutes les 10 minutes en semaine (11h45 → 20h15 Paris = 10h45 → 19h15 UTC)
    - cron: '45,55 10 * * 1-5'
    - cron: '5,15,25,35,45,55 11-18 * * 1-5'
    - cron: '5,15 19 * * 1-5'

    # Week-end toutes les 10 min (10h → 22h Paris = 9h → 21h UTC)
    - cron: '0,10,20,30,40,50 9-20 * * 6,0'
    - cron: '0 21 * * 6,0'
  
  workflow_dispatch:  # Permet execution manuelle

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Create credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          cd backend
          echo "$GOOGLE_CREDENTIALS" > credentials.json
          sed -i "s/VOTRE_SHEET_ID/$SPREADSHEET_ID/g" sync_cnf3_complet.py
      
      - name: Run sync
        run: |
          cd backend
          python sync_cnf3_complet.py
      
      - name: Copy to frontend
        run: |
          cp backend/data.json docs/data.json
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CNF3 Bot"
          git add docs/data.json backend/data.json
          git diff --staged --quiet || git commit -m "Update CNF3 data"
          git push
