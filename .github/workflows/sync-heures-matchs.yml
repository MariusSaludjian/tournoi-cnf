name: Sync CNF3 (heures de matchs)

on:
  schedule:
    # Toutes les 10 minutes entre 11h45 et 14h15
    # Format : minute heure jour mois jour_semaine
    # GitHub utilise UTC, Paris = UTC+1
    # Donc 11h45-14h15 Paris = 10h45-13h15 UTC
    
    - cron: '45,55 10 * * 1-5'  # 11h45, 11h55
    - cron: '5,15,25,35,45,55 11 * * 1-5'  # 12h05 à 12h55
    - cron: '5,15 12 * * 1-5'  # 13h05, 13h15
  
  workflow_dispatch:  # Permet execution manuelle

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Create credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          cd backend
          echo "$GOOGLE_CREDENTIALS" > credentials.json
          sed -i "s/VOTRE_SHEET_ID/$SPREADSHEET_ID/g" sync_cnf3_complet.py
      
      - name: Run sync
        run: |
          cd backend
          python sync_cnf3_complet.py
      
      - name: Copy to frontend
        run: |
          cp backend/data.json docs/data.json
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CNF3 Bot"
          git add docs/data.json backend/data.json
          git diff --staged --quiet || git commit -m "Update CNF3 data"
          git push
