name: Sync Tableau Final CNF3

on:
  schedule:
    # Toutes les 10 minutes en semaine (11h45 → 20h15 Paris = 10h45 → 19h15 UTC)
    - cron: '45,55 10 * * 1-5'
    - cron: '5,15,25,35,45,55 11-18 * * 1-5'
    - cron: '5,15 19 * * 1-5'

    # Week-end toutes les 10 min (10h → 22h Paris = 9h → 21h UTC)
    - cron: '0,10,20,30,40,50 9-20 * * 6,0'
    - cron: '0 21 * * 6,0'

  workflow_dispatch:  # Permet l'exécution manuelle depuis GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth

      - name: Create credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          cd backend
          echo "$GOOGLE_CREDENTIALS" > credentials.json
          # Injecte l'ID du spreadsheet si le script utilise un placeholder
          sed -i "s/VOTRE_SHEET_ID/$SPREADSHEET_ID/g" sync_tableau_final_cnf3.py 2>/dev/null || true

      - name: Run sync tableau final
        run: |
          cd backend
          python sync_tableau_final_cnf3.py

      - name: Copy data.json to frontend
        run: |
          cp backend/data.json docs/data.json

      - name: Commit and push si changements
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CNF3 Tableau Bot"
          git add docs/data.json backend/data.json
          git diff --staged --quiet || git commit -m "🏆 Update CNF3 tableau final [bot]"
          git push
